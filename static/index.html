<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Play chess against an AI clone of any Chess.com player" />
  <title>Play Against Yourself AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <h1 class="title">♚ Play Against <span class="gradient-text">Yourself</span></h1>
      <p class="subtitle">Challenge the AI clone of any Chess.com player</p>
    </header>

    <!-- ── Game Area ── -->
    <main class="main">

      <!-- Board column -->
      <div class="board-col">

        <!-- AI player bar -->
        <div class="player-bar" id="top-player-bar">
          <div class="player-identity">
            <span class="player-icon" id="top-icon">♚</span>
            <span class="player-name" id="top-name">AI</span>
          </div>
          <div class="player-captures">
            <div class="captured-pieces" id="top-captured"></div>
            <div class="material-diff" id="top-diff"></div>
          </div>
          <div class="clock" id="top-clock">10:00</div>
        </div>

        <!-- Board -->
        <div class="board-wrapper" id="board-wrapper">
          <div class="board" id="board"></div>
        </div>

        <!-- Human player bar -->
        <div class="player-bar" id="bottom-player-bar">
          <div class="player-identity">
            <span class="player-icon" id="bottom-icon">♔</span>
            <span class="player-name" id="bottom-name">You</span>
          </div>
          <div class="player-captures">
            <div class="captured-pieces" id="bottom-captured"></div>
            <div class="material-diff" id="bottom-diff"></div>
          </div>
          <div class="clock active-clock" id="bottom-clock">10:00</div>
        </div>

      </div>

      <!-- Side panel -->
      <aside class="panel">

        <!-- Opponent -->
        <div class="panel-block">
          <div class="block-label">Opponent</div>
          <div class="username-row">
            <input type="text" id="username-input" class="username-input"
                   value="0khacha" placeholder="Chess.com username" spellcheck="false" />
            <button class="load-btn" id="load-player">Load</button>
          </div>
          <div class="player-stats" id="player-stats">
            <span class="stats-text">Enter a Chess.com username</span>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Play As + Time Control (side by side) -->
        <div class="two-col-blocks">
          <div class="panel-block">
            <div class="block-label">Play As</div>
            <div class="seg-group">
              <button class="seg-btn active" data-color="white">♔ White</button>
              <button class="seg-btn" data-color="black">♚ Black</button>
            </div>
          </div>
          <div class="panel-block">
            <div class="block-label">Time</div>
            <div class="time-grid">
              <button class="time-btn active" data-minutes="10">10m</button>
              <button class="time-btn" data-minutes="5">5m</button>
              <button class="time-btn" data-minutes="3">3m</button>
              <button class="time-btn" data-minutes="1">1m</button>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Status -->
        <div class="status-row" id="status">
          <span class="status-dot"></span>
          <span class="status-text">Load a player to start</span>
        </div>

        <!-- Moves -->
        <div class="panel-block moves-block">
          <div class="block-label">Moves</div>
          <div class="moves-list" id="moves"></div>
        </div>

        <!-- Actions -->
        <div class="action-row">
          <button class="action-btn primary" id="new-game">⟳ New Game</button>
          <button class="action-btn secondary" id="flip-board">↕ Flip</button>
        </div>

      </aside>
    </main>

    <!-- Footer -->
    <footer class="footer">
      Developed with <span class="heart">♥</span> by
      <a href="https://github.com/0khacha" target="_blank" rel="noopener">0khacha</a>
    </footer>
  </div>

  <!-- Promotion modal -->
  <div class="modal-overlay" id="promotion-modal">
    <div class="modal-card">
      <h3>Promote to</h3>
      <div class="promotion-options" id="promotion-options"></div>
    </div>
  </div>

  <!-- Game-over modal -->
  <div class="modal-overlay" id="game-over-modal">
    <div class="modal-card game-over-card">
      <div class="game-over-icon" id="go-icon">♔</div>
      <h2 class="game-over-title" id="go-title">Game Over</h2>
      <p class="game-over-detail" id="go-detail"></p>
      <button class="action-btn primary wide" id="go-play-again">Play Again</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
